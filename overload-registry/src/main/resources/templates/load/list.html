<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default_layout}">
<head>
    <th:block layout:fragment="script">
        <script th:src="@{/js/index.js}"></script>
    </th:block>
</head>
<body>
<main layout:fragment="content" class="max-w-[1400px] mx-auto px-6 py-12 mt-20">
    <div class="flex gap-8">
        <div class="flex-1">
            <div class="mb-8">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h1 class="text-5xl font-bold text-[#1A1D2E] mb-3">K6 Load test</h1>
                        <p class="text-lg text-gray-500 font-light">K6 Load test 스크립트를 등록하세요.</p>
                    </div>
                    <a class="flex items-center gap-2 bg-[#6B46C1] text-white px-6 py-3 rounded-lg font-medium hover:bg-[#5a3ba3] transition-colors whitespace-nowrap cursor-pointer"
                       th:href="@{/loads}">
                        <i class="ri-add-line text-xl"></i>등록
                    </a>
                </div>
            </div>

            <div class="flex items-center justify-between mb-6">
                <div class="flex gap-2">
                    <button class="px-4 py-2 rounded-full font-medium transition-all bg-[#EDE9FE] text-[#6B46C1]">전체</button>
                    <button class="px-4 py-2 rounded-full font-medium transition-all bg-white text-gray-600 hover:bg-gray-50">완료</button>
                    <button class="px-4 py-2 rounded-full font-medium transition-all bg-white text-gray-600 hover:bg-gray-50">진행</button>
                    <button class="px-4 py-2 rounded-full font-medium transition-all bg-white text-gray-600 hover:bg-gray-50">등록</button>
                </div>
            </div>

            <div id="load-list" class="grid grid-cols-2 gap-6">
            </div>
        </div>
    </div>
</main>

</body>
</html>
