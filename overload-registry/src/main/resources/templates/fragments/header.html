<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <div class="border-b border-gray-100">
        <div class="max-w-[1400px] mx-auto px-6">
            <div class="flex items-center justify-between h-20">
                <a class="flex items-center gap-3 cursor-pointer" th:href="@{/}" data-discover="true">

                    <span class="px-2 py-1 bg-[#EDE9FE] text-[#6B46C1] text-xs font-semibold rounded-full">BETA</span>

                    <a class="text-gray-600 font-medium hover:text-[#6B46C1] transition-colors cursor-pointer" th:href="@{/worker-monitor}">Worker Monitor</a>
