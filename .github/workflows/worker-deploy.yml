name: Worker Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'overload-worker/**'
      - '.github/workflows/worker-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        working-directory: overload-worker
        run: chmod +x gradlew

      - name: Build and Test
        working-directory: overload-worker
        run: ./gradlew clean test

      - name: Build JAR (skip tests)
        working-directory: overload-worker
        run: ./gradlew bootJar -x test

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WORKER_SERVER_HOST }}
          username: ${{ secrets.WORKER_SERVER_USER }}
          key: ${{ secrets.WORKER_SERVER_SSH_KEY }}
          source: "overload-worker/build/libs/overload-worker-*.jar"
          target: ${{ secrets.WORKER_DEPLOY_DIR }}
          strip_components: 3

      - name: Run deploy script on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WORKER_SERVER_HOST }}
          username: ${{ secrets.WORKER_SERVER_USER }}
          key: ${{ secrets.WORKER_SERVER_SSH_KEY }}
          script: ${{ secrets.WORKER_DEPLOY_SCRIPT }}
