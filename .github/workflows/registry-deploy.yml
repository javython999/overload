name: Registry Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'overload-registry/**'
      - '.github/workflows/registry-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: overload
          MYSQL_ROOT_PASSWORD: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        working-directory: overload-registry
        run: chmod +x gradlew

      - name: Build and Test
        working-directory: overload-registry
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/overload?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: test
        run: ./gradlew clean test

      - name: Build JAR (skip tests)
        working-directory: overload-registry
        run: ./gradlew bootJar -x test

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REGISTRY_SERVER_HOST }}
          username: ${{ secrets.REGISTRY_SERVER_USER }}
          key: ${{ secrets.REGISTRY_SERVER_SSH_KEY }}
          source: "overload-registry/build/libs/overload-registry-*.jar"
          target: ${{ secrets.REGISTRY_DEPLOY_DIR }}
          strip_components: 3

      - name: Run deploy script on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REGISTRY_SERVER_HOST }}
          username: ${{ secrets.REGISTRY_SERVER_USER }}
          key: ${{ secrets.REGISTRY_SERVER_SSH_KEY }}
          script: ${{ secrets.REGISTRY_DEPLOY_SCRIPT }}
